[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = ["COREPACK_INTEGRITY_KEYS='' corepack enable && COREPACK_INTEGRITY_KEYS='' corepack prepare pnpm@10.30.3 --activate && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm run build"]

[start]
cmd = "cd server && npx prisma migrate deploy && cd .. && NODE_ENV=production node server/dist/index.js"
